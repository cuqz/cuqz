name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          template: terminal
          filename: metrics.svg
          base: header, activity, metadata
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: 0
          plugin_languages_colors: github
          plugin_languages_sections: most-used
          plugin_languages_indepth: no
          plugin_languages_categories: markup, programming
          config_timezone: Africa/Johannesburg
          extras_css: |
            .header{display:none!important}.banner{display:none!important}
            svg{color:#8b949e!important}
            pre{background:#0d1117!important;color:#e6edf3!important;border-radius:5px!important;padding:8px 12px!important;margin:0!important}
            .title{color:#e6edf3!important}
            .button{background:linear-gradient(#21262d,#161b22)!important}
            .button.exit{background:linear-gradient(#f85149,#da3633)!important}
            .banner,footer{color:#8b949e!important;margin:0!important;line-height:1.2!important}
            .warnings{color:#d29922!important}
            .ps1-path{color:#39d2c0!important}
            .ps1-location{color:#58a6ff!important}
            .diff{color:#58a6ff!important}
            .error{color:#f85149!important}
            .stdout{line-height:1.6!important;margin:2px 0!important}
            .stdin{line-height:2!important}
            .stdout b span{display:inline-block!important;width:7px!important;height:11px!important;font-size:0!important;border-radius:1px!important;vertical-align:middle!important}
